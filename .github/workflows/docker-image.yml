name: Docker image (Coolify)

# Build en GitHub (≈7 GB RAM). Coolify solo hace pull — evita OOM en el VPS.
on:
  push:
    branches:
      - main
      - feature/diputados-senadores
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          # Coolify busca :${{ github.sha }} (SHA completo, sin prefijo).
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/diputados-senadores' }}
            type=ref,event=branch
            type=sha,format=long,prefix=
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_MAX_OLD_SPACE_SIZE=6144
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Opcional: secret COOLIFY_WEBHOOK_URL = URL del webhook de deploy en Coolify.
      # Desactivá auto-deploy al git push para evitar race (Coolify antes que GHA).
      - name: Trigger Coolify webhook
        env:
          WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "COOLIFY_WEBHOOK_URL no configurado; skip"
            exit 0
          fi
          curl -fsS -X GET "$WEBHOOK" || curl -fsS -X POST "$WEBHOOK"
